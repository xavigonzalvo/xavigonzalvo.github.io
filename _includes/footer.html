<footer id="footer" class="w3-content w3-padding-64 w3-text-grey w3-xlarge">
  {% if site.twitter_username %}
    <a href="https://twitter.com/{{ site.twitter_username }}"><i class="fa fa-twitter w3-hover-opacity"></i></a>
  {% endif %}
  {% if site.github_username %}
    <a href="https://github.com/{{ site.github_username }}"><i class="fa fa-github w3-hover-opacity"></i></a>
  {% endif %}
  {% if site.researchgate_username %}
    <a href="https://www.researchgate.net/profile/{{ site.researchgate_username }}"><i class="fab fa-researchgate w3-hover-opacity"></i></a>
  {% endif %}
  {% if site.linkedin_username %}
    <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}/"><i class="fa fa-linkedin w3-hover-opacity"></i></a>
  {% endif %}

  <p class="w3-medium">
    <i class="fas fa-copyright"></i>
    {{ site.title }}
  </p>
    <p class="w3-medium">Powered by <a href="https://www.w3schools.com/w3css/default.asp"
      target="_blank" class="w3-hover-text-green">w3.css</a> and made with
      <a class="w3-hover-text-green" href="https://jekyllrb.com/">Jekyll</a></p>
</footer>
